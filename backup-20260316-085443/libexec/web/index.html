<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOBA // COMMAND CENTER</title>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background: #020617; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(15, 23, 42, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.15) 0, transparent 50%);
            color: #f1f5f9;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .glow-blue { border-top: 1px solid rgba(56, 189, 248, 0.4); box-shadow: 0 0 30px rgba(56, 189, 248, 0.05); }
        .terminal-bg { background: rgba(0, 0, 0, 0.4); font-family: 'Fira Code', monospace; }
        .progress-bar { background: rgba(30, 41, 59, 0.6); height: 6px; border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .bookmark-card:hover { background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body x-data="nobaApp()">

    <template x-if="!authenticated">
        <div class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/95 backdrop-blur-3xl p-6">
            <div class="glass p-12 rounded-[2.5rem] w-full max-w-md glow-blue text-center">
                <i class="fa-solid fa-microchip text-6xl text-sky-500 mb-8 drop-shadow-[0_0_20px_rgba(56,189,248,0.5)]"></i>
                <h2 class="text-4xl font-black tracking-tighter uppercase italic text-white mb-2">Noba<span class="text-sky-500">Core</span></h2>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em] mb-10">Secure Infrastructure Node</p>
                <form @submit.prevent="login" class="space-y-4">
                    <input type="password" x-model="password" placeholder="ACCESS KEY" 
                           class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-5 text-center text-xl focus:border-sky-500 transition-all outline-none font-bold tracking-widest">
                    <button class="w-full bg-sky-600 hover:bg-sky-500 py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all shadow-xl shadow-sky-500/20">Establish Link</button>
                    <p x-show="error" x-text="error" class="text-rose-500 text-[10px] font-bold mt-4 uppercase"></p>
                </form>
            </div>
        </div>
    </template>

    <div class="max-w-[1600px] mx-auto p-8 lg:p-16" x-show="authenticated" x-cloak>
        
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-16 gap-8">
            <div class="space-y-2">
                <h1 class="text-5xl font-black tracking-tighter uppercase italic text-white leading-none">Noba<span class="text-sky-500">Core</span></h1>
                <div class="flex items-center gap-4">
                    <span class="text-slate-500 text-[10px] font-black uppercase tracking-[0.5em]">Infrastructure Command</span>
                    <span class="h-px w-12 bg-slate-800"></span>
                    <span class="text-sky-500/60 text-[10px] font-mono tracking-widest">v8.6.5 // SITE-A-DDR</span>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="glass px-8 py-4 rounded-3xl flex items-center gap-4 border-sky-500/20">
                    <span :class="connected ? 'bg-emerald-500 shadow-[0_0_15px_#10b981]' : 'bg-rose-500'" class="w-3 h-3 rounded-full animate-pulse"></span>
                    <span class="text-xs font-black tracking-[0.2em] text-slate-200 uppercase" x-text="connected ? 'System: Online' : 'System: Critical'"></span>
                </div>
                <button @click="logout" class="glass w-14 h-14 rounded-3xl flex items-center justify-center text-slate-500 hover:text-rose-500 transition-all">
                    <i class="fa-solid fa-power-off text-xl"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
            
            <div class="xl:col-span-4 space-y-10">
                
                <div class="glass p-10 rounded-[2.5rem] glow-blue">
                    <h3 class="text-[11px] font-black text-slate-500 uppercase tracking-[0.4em] mb-12 flex justify-between">
                        Hardware Telemetry <i class="fa-solid fa-gauge-high text-sky-500/30"></i>
                    </h3>
                    <div class="space-y-12">
                        <template x-for="(val, key) in stats">
                            <div>
                                <div class="flex justify-between text-[10px] font-black uppercase mb-4 tracking-widest">
                                    <span class="text-slate-400" x-text="key.replace('_', ' ')"></span>
                                    <span class="text-sky-400 font-mono text-xs" x-text="val"></span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" 
                                         :class="parseInt(val) > 85 ? 'bg-rose-500' : 'bg-sky-500 shadow-[0_0_12px_rgba(56,189,248,0.5)]'"
                                         :style="`width: ${parseInt(val) || 0}%`"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="glass p-10 rounded-[2.5rem]">
                    <h3 class="text-[11px] font-black text-slate-500 uppercase tracking-[0.4em] mb-8">Quick Access</h3>
                    <div class="grid grid-cols-1 gap-4">
                        <template x-for="link in bookmarks">
                            <a :href="link.url" target="_blank" class="bookmark-card flex items-center justify-between p-5 glass border-transparent rounded-2xl transition-all group">
                                <div class="flex items-center gap-4">
                                    <i :class="link.icon" class="text-slate-500 group-hover:text-sky-400 transition-colors"></i>
                                    <span class="text-xs font-bold uppercase tracking-widest text-slate-300" x-text="link.name"></span>
                                </div>
                                <i class="fa-solid fa-arrow-up-right-from-square text-[10px] text-slate-700"></i>
                            </a>
                        </template>
                    </div>
                </div>

                <div class="glass p-10 rounded-[2.5rem] border-l-4 border-emerald-500/40">
                    <h3 class="text-[11px] font-black text-slate-500 uppercase tracking-[0.4em] mb-8">Directives</h3>
                    <button @click="runAction('organize')" class="w-full flex items-center justify-between p-6 bg-slate-900/50 border border-slate-800 rounded-2xl hover:border-sky-500 transition-all group">
                        <span class="text-xs font-black uppercase tracking-widest">Execute Organizer</span>
                        <i class="fa-solid fa-bolt-lightning text-slate-600 group-hover:text-sky-400 group-hover:scale-125 transition-all"></i>
                    </button>
                </div>
            </div>

            <div class="xl:col-span-8">
                <div class="glass rounded-[2.5rem] h-full flex flex-col overflow-hidden">
                    <div class="px-10 py-8 border-b border-white/5 flex justify-between items-center bg-black/30">
                        <div class="flex items-center gap-4">
                            <span class="text-[11px] font-black text-slate-500 uppercase tracking-[0.4em]">Live Execution Telemetry</span>
                            <span class="px-3 py-1 bg-emerald-500/10 text-emerald-500 text-[9px] font-black rounded-full uppercase tracking-widest">Stream Active</span>
                        </div>
                        <div class="flex gap-3">
                            <div class="w-2.5 h-2.5 rounded-full bg-slate-800"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-slate-800"></div>
                        </div>
                    </div>
                    <div class="p-10 terminal-bg overflow-y-auto h-[800px] text-[15px] leading-relaxed" id="logWindow">
                        <template x-for="log in logs">
                            <div class="flex gap-6 mb-4 group opacity-80 hover:opacity-100 transition-opacity">
                                <span class="text-sky-900 font-bold select-none shrink-0 italic">#</span>
                                <span class="text-emerald-400/90 tracking-tight" x-text="log"></span>
                            </div>
                        </template>
                        <div x-show="logs.length === 0" class="text-slate-800 font-mono italic animate-pulse">Initializing log buffer...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function nobaApp() {
            return {
                password: '',
                error: '',
                authenticated: localStorage.getItem('noba_v3_session') === 'true',
                stats: {},
                logs: [],
                connected: false,
                bookmarks: [
                    { name: 'TrueNAS', url: 'http://vnnas.vannieuwenhove.org', icon: 'fa-solid fa-server' },
                    { name: 'Pi-Hole', url: 'http://dnsa01.vannieuwenhove.org/admin', icon: 'fa-solid fa-shield-halved' },
                    { name: 'Home Assistant', url: 'http://homeassistant.local:8123', icon: 'fa-solid fa-house-laptop' }
                ],
                init() { if(this.authenticated) this.start(); },
                async login() {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: this.password, username: 'raizen' })
                    });
                    const data = await res.json();
                    if(data.token) {
                        localStorage.setItem('noba_v3_session', 'true');
                        localStorage.setItem('noba_token', data.token);
                        this.authenticated = true;
                        this.start();
                    } else { this.error = 'ACCESS DENIED'; }
                },
                logout() {
                    localStorage.removeItem('noba_v3_session');
                    localStorage.removeItem('noba_token');
                    location.reload();
                },
                start() {
                    const es = new EventSource('/api/stats');
                    es.onmessage = (e) => { this.stats = JSON.parse(e.data); this.connected = true; };
                    es.addEventListener('log', (e) => {
                        this.logs.push(e.data);
                        if(this.logs.length > 300) this.logs.shift();
                        this.$nextTick(() => {
                            const w = document.getElementById('logWindow');
                            w.scrollTo({ top: w.scrollHeight, behavior: 'smooth' });
                        });
                    });
                    es.onerror = () => { this.connected = false; };
                },
                async runAction(a) {
                    await fetch('/api/run', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + localStorage.getItem('noba_token')
                        },
                        body: JSON.stringify({ action: a })
                    });
                }
            }
        }
    </script>
</body>
</html>
