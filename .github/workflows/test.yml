name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies & BATS
        run: |
          sudo apt-get update
          # Install bats and required script packages so check_deps passes
          sudo apt-get install -y bats dialog rsync jq lsof lm-sensors
          # Install the official Go version of yq (apt often has the wrong Python version)
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq

      - name: Make scripts executable
        run: |
          chmod +x *.sh 2>/dev/null || true
          chmod +x libexec/*.sh 2>/dev/null || true
          chmod +x libexec/lib/*.sh 2>/dev/null || true
          chmod +x tests/*.bats 2>/dev/null || true

      - name: Run BATS test suite
        run: bats tests/

      - name: Run Edge-Case Test Harness
        run: ./test-all.sh
