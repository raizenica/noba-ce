name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install fastapi 'uvicorn[standard]' psutil pyyaml httpx websocket-client cryptography ruff
          pip install pytest pytest-asyncio starlette httpx

      - name: Lint
        run: ruff check share/noba-web/server/

      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: share/noba-web

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: share/noba-web/frontend/package-lock.json

      - name: Install dependencies
        run: cd share/noba-web/frontend && npm ci

      - name: Run tests
        run: cd share/noba-web/frontend && npm test

      - name: Build
        run: cd share/noba-web/frontend && npm run build

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: shellcheck -S warning install.sh scripts/*.sh
