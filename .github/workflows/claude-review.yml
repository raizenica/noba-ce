name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]

jobs:
  claude:
    # Only run on PR events, or on comments that mention @claude
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are reviewing code for the NOBA Command Center project.

            Follow the project's CLAUDE.md for all coding conventions.

            On PR review, check for:
            1. Python: ruff compliance, proper auth decorators, thread safety with locks
            2. JavaScript: Alpine.js patterns, SETTINGS_KEYS/LIVE_DATA_KEYS/DEF_VIS consistency
            3. HTML: x-model bindings match JS state, label-for matches IDs, card structure pattern
            4. Security: input validation on all user-facing endpoints, no command injection, proper auth checks
            5. Settings: new config keys added to WEB_KEYS, yaml_config defaults, and JS SETTINGS_KEYS
            6. Cross-references: collector wiring matches integration functions
            7. Null safety: Alpine expressions guard against null data before SSE arrives

            On @claude mention, respond helpfully with code context.
