# docker-compose.yml — NOBA Command Center
#
# Quick start:
#   docker compose up -d
#   docker logs noba 2>&1 | grep password
#
# Then open http://localhost:8080 and log in with the generated password.
#
services:
  noba:
    image: ghcr.io/raizenica/noba-ce:latest
    # To build from source instead, comment the line above and uncomment:
    # build: .
    container_name: noba
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Europe/Brussels
    volumes:
      # Configuration (persists settings, users, agent keys)
      - ./data/config:/app/config
      # Database (persists metrics, history, agent registry)
      - ./data/db:/app/data
      # Optional: Docker socket for container monitoring
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/status/public"]
      interval: 30s
      timeout: 5s
      start_period: 10s
