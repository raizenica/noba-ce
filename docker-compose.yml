# docker-compose.yml — NOBA Command Center
services:
  noba:
    build: .
    container_name: noba
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Europe/Brussels
    volumes:
      # Configuration (persists settings, users, agent keys)
      - ./data/config:/app/config
      # Database (persists metrics, history, agent registry)
      - ./data/db:/app/data
      # Optional: TLS certificates for HTTPS
      - ./data/certs:/app/certs:ro
      # Optional: Docker socket for container monitoring
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      start_period: 10s
